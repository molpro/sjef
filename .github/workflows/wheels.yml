name: wheels

on:
  push:
    tags: [ "[0-9]+.[0-9]+.[0-9]+" ]   # matches existing tag style, e.g. 1.45.4
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-15-intel      # Intel
          - os: macos-latest      # Apple Silicon
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools_scm and LibraryManager both need tag history

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BEFORE_ALL_LINUX: >
            set -eux &&
            if command -v yum >/dev/null 2>&1; then
              yum -y install libxml2-devel libxslt-devel;
            elif command -v apt-get >/dev/null 2>&1; then
                        apt-get update && apt-get install -y libxml2-dev libxslt1-dev;
            elif command -v apk >/dev/null 2>&1; then
              apk add --no-cache libxml2-dev libxslt-dev;
            fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: pipx run build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs: [ build_wheels, build_sdist ]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing to PyPI, no API token needed
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1